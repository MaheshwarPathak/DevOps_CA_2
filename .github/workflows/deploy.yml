name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Login to Docker Hub
        uses: docker/login-action@v5
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME || secrets.DOCAER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: docker.io/${{ secrets.DOCKER_USERNAME || secrets.DOCAER_USERNAME }}/ci-cd-app:latest
